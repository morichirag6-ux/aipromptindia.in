name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload only site files, not .github or hidden folders
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./   # root folder containing index.html

      - name: Deploy
        uses: actions/deploy-pages@v4
